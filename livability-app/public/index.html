<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>livability.ai — Find out what living here really feels like</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:   #F5F0E8;
      --cream-2: #EDE7D9;
      --cream-3: #E4DDD0;
      --forest:  #2C4A3E;
      --forest-2:#3D6357;
      --moss:    #7A9E8E;
      --sand:    #C4A882;
      --sand-2:  #B8956A;
      --ink:     #1A1A18;
      --ink-2:   #3A3A35;
      --ink-3:   #7A7A72;
      --ink-4:   #AEAEA5;
      --white:   #FFFFFF;
      --score-high: #2C4A3E;
      --score-mid:  #7A9E8E;
      --score-low:  #C4836A;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* NAV */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 2.5rem; border-bottom: 1px solid var(--cream-3); background: var(--cream); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--forest); letter-spacing: -0.3px; }
    .logo span { color: var(--sand); font-style: italic; }
    .lang-row { display: flex; gap: 4px; }
    .lang-btn { background: none; border: 1px solid var(--cream-3); border-radius: 20px; padding: 5px 14px; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 400; color: var(--ink-3); cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; }
    .lang-btn.active { background: var(--forest); border-color: var(--forest); color: var(--white); }

    /* HERO */
    .hero { max-width: 680px; margin: 0 auto; padding: 6rem 2rem 3.5rem; text-align: center; }
    .eyebrow { display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: var(--moss); margin-bottom: 1.5rem; }
    .hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(34px, 5.5vw, 54px); line-height: 1.12; color: var(--forest); margin-bottom: 1.1rem; letter-spacing: -1px; }
    .hero h1 em { font-style: italic; color: var(--sand-2); }
    .hero p { font-size: 16px; color: var(--ink-3); line-height: 1.75; max-width: 420px; margin: 0 auto 2.75rem; font-weight: 300; }

    /* SEARCH */
    .search-wrap { max-width: 580px; margin: 0 auto; }
    .search-box { display: flex; gap: 0; background: var(--white); border: 1.5px solid var(--cream-3); border-radius: 100px; padding: 5px 5px 5px 22px; box-shadow: 0 2px 20px rgba(44,74,62,0.07); transition: border-color 0.2s, box-shadow 0.2s; }
    .search-box:focus-within { border-color: var(--forest); box-shadow: 0 2px 20px rgba(44,74,62,0.13); }
    .search-box input { flex: 1; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 300; color: var(--ink); background: transparent; min-width: 0; }
    .search-box input::placeholder { color: var(--ink-4); }
    .search-btn { background: var(--forest); color: var(--white); border: none; border-radius: 100px; padding: 11px 22px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background 0.2s; letter-spacing: 0.3px; }
    .search-btn:hover { background: var(--forest-2); }
    .search-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .chips { margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }
    .chips span:first-child { font-size: 12px; color: var(--ink-4); }
    .chip { display: inline-block; background: var(--cream-2); border-radius: 20px; padding: 4px 13px; font-size: 12px; color: var(--ink-2); cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
    .chip:hover { background: var(--forest); color: var(--white); }

    /* ERROR */
    .error-bar { max-width: 580px; margin: 1rem auto 0; background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 0.75rem 1rem; font-size: 13px; color: #DC2626; display: none; text-align: center; }
    .error-bar.visible { display: block; }

    /* LOADING */
    .loading { display: none; text-align: center; padding: 5rem 2rem; }
    .loading.visible { display: block; }
    .loader-ring { width: 36px; height: 36px; border: 1.5px solid var(--cream-3); border-top-color: var(--forest); border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 1.25rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 13px; color: var(--ink-4); letter-spacing: 0.3px; }

    /* ── REPORT ── */
    .report { display: none; max-width: 720px; margin: 0 auto; padding: 0 2rem 5rem; }
    .report.visible { display: block; }

    /* ADDRESS STRIP */
    .addr-strip { display: flex; align-items: center; gap: 12px; padding: 0.9rem 1.25rem; margin-bottom: 2rem; border-bottom: 1px solid var(--cream-3); }
    .addr-pin { width: 8px; height: 8px; border-radius: 50%; background: var(--forest); flex-shrink: 0; }
    .addr-main { font-size: 13px; font-weight: 500; color: var(--ink); }
    .addr-sub { font-size: 12px; color: var(--ink-4); margin-top: 1px; }
    .new-search { margin-left: auto; font-size: 12px; color: var(--moss); cursor: pointer; white-space: nowrap; font-weight: 500; border: none; background: none; font-family: inherit; padding: 0; }
    .new-search:hover { color: var(--forest); }

    /* SCORE SECTION — signature element */
    .score-section { display: grid; grid-template-columns: 1fr 180px; gap: 2rem; align-items: end; margin-bottom: 2.5rem; }
    @media (max-width: 540px) { .score-section { grid-template-columns: 1fr; } }
    .score-summary .s-label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--moss); font-weight: 500; margin-bottom: 0.75rem; }
    .score-summary .s-text { font-family: 'DM Serif Display', serif; font-size: clamp(18px, 3vw, 22px); line-height: 1.45; color: var(--ink-2); font-weight: 400; }
    .score-dial { text-align: center; }
    .dial-svg { display: block; margin: 0 auto; }
    .dial-num { font-family: 'DM Serif Display', serif; font-size: 48px; color: var(--forest); line-height: 1; margin-top: 8px; }
    .dial-sub { font-size: 11px; color: var(--ink-4); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }

    /* DIVIDER */
    .divider { height: 1px; background: var(--cream-3); margin: 2rem 0; }

    /* SCORE BARS */
    .score-bars { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2.5rem; }
    .bar-row { display: grid; grid-template-columns: 90px 1fr 36px; align-items: center; gap: 1rem; }
    .bar-label { font-size: 12px; color: var(--ink-3); font-weight: 400; letter-spacing: 0.2px; }
    .bar-track { height: 5px; background: var(--cream-3); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 5px; border-radius: 3px; transition: width 1.2s cubic-bezier(.16,1,.3,1); }
    .bar-val { font-size: 13px; font-weight: 500; color: var(--ink-2); text-align: right; font-variant-numeric: tabular-nums; }

    /* PROS CONS */
    .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2.5rem; }
    @media (max-width: 480px) { .pros-cons { grid-template-columns: 1fr; } }
    .pc-block .pc-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-4); font-weight: 500; margin-bottom: 1rem; }
    .pc-item { display: flex; gap: 12px; margin-bottom: 0.9rem; font-size: 13px; color: var(--ink-2); line-height: 1.6; font-weight: 300; }
    .pc-item:last-child { margin-bottom: 0; }
    .pc-line { width: 1.5px; flex-shrink: 0; border-radius: 2px; margin-top: 4px; align-self: stretch; }

    /* NEARBY */
    .nearby-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-4); font-weight: 500; margin-bottom: 1.25rem; }
    .nearby-list { display: flex; flex-direction: column; gap: 0; margin-bottom: 2.5rem; }
    .nearby-row { display: flex; align-items: center; gap: 14px; padding: 0.85rem 0; border-bottom: 1px solid var(--cream-3); }
    .nearby-row:first-child { border-top: 1px solid var(--cream-3); }
    .nearby-cat { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-4); width: 70px; flex-shrink: 0; }
    .nearby-name { flex: 1; font-size: 13px; color: var(--ink-2); font-weight: 400; }
    .nearby-dist { font-size: 12px; color: var(--moss); font-weight: 500; white-space: nowrap; }

    /* TIP */
    .tip-block { border-left: 2px solid var(--sand); padding: 0 0 0 1.25rem; margin-bottom: 2.5rem; }
    .tip-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--sand-2); font-weight: 500; margin-bottom: 0.6rem; }
    .tip-text { font-size: 14px; color: var(--ink-2); line-height: 1.75; font-weight: 300; font-style: italic; }

    /* FOOT */
    .foot-note { font-size: 11px; color: var(--ink-4); line-height: 1.8; text-align: center; }
  </style>
</head>
<body>
<nav>
  <div class="logo">livability<span>.ai</span></div>
  <div class="lang-row">
    <button class="lang-btn active" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lang-btn" onclick="setLang('zh')" id="btn-zh">中文</button>
  </div>
</nav>

<div class="hero" id="hero-section">
  <span class="eyebrow" id="eyebrow">Living Experience Report</span>
  <h1 id="h1">Find out what living here<br><em>really</em> feels like</h1>
  <p id="subhead">Enter any address for a detailed report on what it's actually like to live there — noise, walkability, safety, and more.</p>
  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="address-input" placeholder="Enter an address…" />
      <button class="search-btn" id="gen-btn" onclick="generate()">
        <span id="btn-text">Analyze</span>
      </button>
    </div>
    <div class="chips" id="chips-row">
      <span>Try:</span>
      <span class="chip" onclick="tryExample('210 Conner Drive, Chapel Hill, NC 27514')">Chapel Hill, NC</span>
      <span class="chip" onclick="tryExample('1600 Pennsylvania Ave NW, Washington DC')">Washington DC</span>
      <span class="chip" onclick="tryExample('350 Fifth Avenue, New York, NY 10118')">New York</span>
    </div>
  </div>
</div>

<div class="error-bar" id="error-bar"></div>
<div class="loading" id="loading">
  <div class="loader-ring"></div>
  <p id="loading-text">Analyzing neighborhood…</p>
</div>

<div class="report" id="report"></div>

<script>
let lang = 'en';
const T = {
  en: {
    eyebrow:'Living Experience Report', h1:'Find out what living here<br><em>really</em> feels like',
    subhead:"Enter any address for a detailed report on what it's actually like to live there — noise, walkability, safety, and more.",
    btn:'Analyze', placeholder:'Enter an address…',
    loading:['Analyzing neighborhood…','Checking walkability & transit…','Scanning nearby amenities…','Assessing noise & safety…','Writing your report…'],
    overall:'Overall living experience',
    bars:{ walkability:'Walkability', transit:'Transit', safety:'Safety', noise:'Quiet score', amenities:'Amenities' },
    pros:'What works well', cons:'Worth knowing',
    nearby:'What\'s nearby',
    catMap:{ grocery:'Grocery', transit:'Transit', restaurant:'Dining', park:'Parks', hospital:'Medical', school:'Schools' },
    tip:'Local insight',
    newSearch:'New search',
    foot:'AI-generated from training data · Distances are estimates · Always visit in person before committing',
    error:'Something went wrong. Please try again.',
    outof:'out of 100',
  },
  zh: {
    eyebrow:'居住体验报告', h1:'搬进去之前，先了解<br><em>真实的</em>居住感受',
    subhead:'输入任意地址，获取步行、交通、安全、噪音等详细居住体验报告。',
    btn:'开始分析', placeholder:'输入地址…',
    loading:['正在分析…','检查步行和交通…','扫描周边配套…','评估噪音和安全…','生成报告中…'],
    overall:'综合居住体验',
    bars:{ walkability:'步行指数', transit:'交通便利', safety:'安全指数', noise:'安静程度', amenities:'配套设施' },
    pros:'居住优点', cons:'注意事项',
    nearby:'周边设施',
    catMap:{ grocery:'超市', transit:'交通', restaurant:'餐饮', park:'公园', hospital:'医疗', school:'学校' },
    tip:'居民内部消息',
    newSearch:'重新搜索',
    foot:'AI基于训练数据生成 · 距离为估算值 · 做决定前请务必实地考察',
    error:'生成失败，请重试。',
    outof:'满分100',
  }
};

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').className='lang-btn'+(l==='en'?' active':'');
  document.getElementById('btn-zh').className='lang-btn'+(l==='zh'?' active':'');
  const s=T[l];
  document.getElementById('eyebrow').textContent=s.eyebrow;
  document.getElementById('h1').innerHTML=s.h1;
  document.getElementById('subhead').textContent=s.subhead;
  document.getElementById('btn-text').textContent=s.btn;
  document.getElementById('address-input').placeholder=s.placeholder;
}

function tryExample(addr) {
  document.getElementById('address-input').value=addr;
  generate();
}

function resetToHome() {
  document.getElementById('report').className='report';
  document.getElementById('hero-section').style.display='';
  document.getElementById('address-input').value='';
  window.scrollTo({top:0,behavior:'smooth'});
}

async function generate() {
  const addr=document.getElementById('address-input').value.trim();
  if(!addr) return;
  const s=T[lang];
  document.getElementById('error-bar').className='error-bar';
  document.getElementById('report').className='report';
  document.getElementById('hero-section').style.display='none';
  document.getElementById('loading').className='loading visible';
  document.getElementById('gen-btn').disabled=true;
  let step=0;
  document.getElementById('loading-text').textContent=s.loading[0];
  const iv=setInterval(()=>{ if(step<s.loading.length-1) document.getElementById('loading-text').textContent=s.loading[++step]; },1100);
  try {
    const res=await fetch('/api/report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({address:addr,language:lang})});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'error');
    clearInterval(iv);
    document.getElementById('loading').className='loading';
    renderReport(data,s);
  } catch(e) {
    clearInterval(iv);
    document.getElementById('loading').className='loading';
    document.getElementById('hero-section').style.display='';
    showError(s.error);
  }
  document.getElementById('gen-btn').disabled=false;
}

function barColor(v) {
  if(v>=75) return 'var(--score-high)';
  if(v>=50) return 'var(--score-mid)';
  return 'var(--score-low)';
}

function dialArc(score) {
  const r=54, cx=64, cy=64;
  const startAngle=-210, totalArc=240;
  const endAngle=startAngle+(totalArc*(score/100));
  const toRad=a=>a*Math.PI/180;
  const sx=cx+r*Math.cos(toRad(startAngle));
  const sy=cy+r*Math.sin(toRad(startAngle));
  const ex=cx+r*Math.cos(toRad(endAngle));
  const ey=cy+r*Math.sin(toRad(endAngle));
  const large=totalArc*(score/100)>180?1:0;
  const trackEx=cx+r*Math.cos(toRad(startAngle+totalArc));
  const trackEy=cy+r*Math.sin(toRad(startAngle+totalArc));
  const col=score>=75?'#2C4A3E':score>=50?'#7A9E8E':'#C4836A';
  return `<svg class="dial-svg" width="128" height="100" viewBox="0 0 128 100">
    <path d="M${sx},${sy} A${r},${r} 0 1 1 ${trackEx},${trackEy}" fill="none" stroke="#EDE7D9" stroke-width="6" stroke-linecap="round"/>
    ${score>0?`<path d="M${sx},${sy} A${r},${r} 0 ${large} 1 ${ex},${ey}" fill="none" stroke="${col}" stroke-width="6" stroke-linecap="round"/>`:''}
  </svg>`;
}

function renderReport(r, s) {
  const ov=Math.round(r.overall);
  const catMap=s.catMap;

  const barsHtml=Object.entries(r.scores).map(([k,v])=>{
    const val=Math.round(v);
    const col=barColor(val);
    return `<div class="bar-row">
      <div class="bar-label">${s.bars[k]||k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${val}%;background:${col}"></div></div>
      <div class="bar-val" style="color:${col}">${val}</div>
    </div>`;
  }).join('');

  const prosHtml=r.pros.map(p=>`<div class="pc-item"><div class="pc-line" style="background:var(--moss)"></div><span>${p}</span></div>`).join('');
  const consHtml=r.cons.map(c=>`<div class="pc-item"><div class="pc-line" style="background:var(--sand)"></div><span>${c}</span></div>`).join('');

  const nearbyHtml=r.nearby.map(n=>`<div class="nearby-row">
    <div class="nearby-cat">${catMap[n.type]||n.type}</div>
    <div class="nearby-name">${n.name}</div>
    <div class="nearby-dist">${n.distance}</div>
  </div>`).join('');

  document.getElementById('report').innerHTML=`
    <div class="addr-strip">
      <div class="addr-pin"></div>
      <div><div class="addr-main">${r.address}</div><div class="addr-sub">${r.city}</div></div>
      <button class="new-search" onclick="resetToHome()">${s.newSearch} →</button>
    </div>

    <div class="score-section">
      <div class="score-summary">
        <div class="s-label">${s.overall}</div>
        <div class="s-text">${r.summary}</div>
      </div>
      <div class="score-dial">
        ${dialArc(ov)}
        <div class="dial-num">${ov}</div>
        <div class="dial-sub">${s.outof}</div>
      </div>
    </div>

    <div class="score-bars">${barsHtml}</div>
    <div class="divider"></div>

    <div class="pros-cons">
      <div class="pc-block">
        <div class="pc-label">${s.pros}</div>
        ${prosHtml}
      </div>
      <div class="pc-block">
        <div class="pc-label">${s.cons}</div>
        ${consHtml}
      </div>
    </div>
    <div class="divider"></div>

    <div class="nearby-label">${s.nearby}</div>
    <div class="nearby-list">${nearbyHtml}</div>
    <div class="divider"></div>

    <div class="tip-block">
      <div class="tip-label">${s.tip}</div>
      <div class="tip-text">${r.insider_tip}</div>
    </div>

    <p class="foot-note">${s.foot}</p>
  `;
  document.getElementById('report').className='report visible';
  window.scrollTo({top:0,behavior:'smooth'});
}

function showError(msg) {
  const el=document.getElementById('error-bar');
  el.textContent=msg; el.className='error-bar visible';
}

document.getElementById('address-input').addEventListener('keydown',e=>{ if(e.key==='Enter') generate(); });
</script>
</body>
</html>
